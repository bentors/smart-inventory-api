spring.application.name=smartinventory

# ===============================
# CONFIGURACOES DO BANCO DE DADOS
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/smart_inventory_db}
spring.datasource.username=${DB_USER:usuario_local}
spring.datasource.password=${DB_PASS:senha_local}

# ===============================
# CONFIGURACOES DO JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURACOES DO FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.check-location=false