spring.application.name=smartinventory

# ===============================
# CONFIGURACOES DO BANCO DE DADOS
# ===============================
# Tenta ler do Render/Nuvem. Se nao achar, usa o seu Docker local na porta 5433
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/smart_inventory_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:usuario_local}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:senha_local}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# CONFIGURACOES DO JPA / HIBERNATE
# ===============================
# Validate para garantir que o Flyway criou tudo certo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURACOES DO FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0